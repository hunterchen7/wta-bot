name: CI

# Tests only — production deploys are handled by Cloudflare Workers Builds
# (token-free git integration; see README "Deploy"). This workflow needs no
# secrets and gates PRs + main with typecheck and the workers-pool suite.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
