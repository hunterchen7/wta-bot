<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101a17" />
    <script>
      (() => {
        try {
          const apply = (dark) => {
            document.documentElement.classList.toggle('dark', dark);
            document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
            document.querySelector('meta[name="theme-color"]').content = dark ? '#171717' : '#101a17';
          };
          const saved = localStorage.getItem('wta:theme');
          apply(saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches));
          addEventListener('storage', (event) => {
            if (event.key === 'wta:theme' && event.newValue) apply(event.newValue === 'dark');
          });
        } catch {}
      })();
    </script>
    <title>WTA Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
